<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Dynamic Map Renderer — GM</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="gm-view">

  <aside id="sidebar">

    <section class="panel" id="session-panel">
      <button type="button" class="panel-title" aria-expanded="true">Session</button>
      <div class="panel-body">
        <div class="room-code-row">
          <span class="label">Room Code</span>
          <code id="room-code" class="room-code">…</code>
        </div>
        <div id="qr-container"><canvas></canvas></div>
        <div class="session-actions">
          <button id="open-player-btn" class="btn btn--primary">Open Player Window</button>
          <button id="copy-url-btn"    class="btn btn--ghost">Copy Player URL</button>
        </div>
        <div class="session-meta">
          <span>Players: <strong id="player-count">0</strong></span>
        </div>
      </div>
    </section>

    <section class="panel" id="map-panel">
      <button type="button" class="panel-title" aria-expanded="true">Map</button>
      <div class="panel-body">
        <p class="map-section-label">Current Map</p>
        <select id="map-select" class="select-full"></select>
        <label class="upload-label btn btn--ghost">
          Upload New Map
          <input type="file" id="map-upload" accept=".png,.jpg,.jpeg,.webp" hidden />
        </label>
        <button id="delete-map-btn" class="btn btn--danger btn--sm">Delete Current Map</button>
        <p class="map-section-label map-section-label--gap">All Map Data</p>
        <div class="btn-row">
          <button id="export-btn" class="btn btn--ghost btn--sm">Save to File</button>
          <label class="btn btn--ghost btn--sm">
            Load Maps File
            <input type="file" id="bundle-import" accept=".json" hidden />
          </label>
        </div>
      </div>
    </section>

    <section class="panel" id="fog-panel">
      <button type="button" class="panel-title" aria-expanded="true">Fog of War</button>
      <div class="panel-body">
        <div class="fog-toolbar">
          <button id="fog-draw-btn" class="btn btn--sm btn--ghost">Draw</button>
          <button id="fog-delete-btn" class="btn btn--sm btn--danger" hidden>Delete</button>
          <input type="color" id="fog-colour" value="#000000" title="Fog colour" />
        </div>
        <p class="fog-hint">Click to place vertices · Click near first to close · Esc to cancel · Del to delete selected</p>
      </div>
    </section>

    <section class="panel" id="filter-panel-section">
      <button type="button" class="panel-title" aria-expanded="true">Filter</button>
      <div class="panel-body">
        <select id="filter-select" class="select-full"></select>
        <div id="filter-params" class="filter-params-container"></div>
      </div>
    </section>

    <section class="panel" id="view-panel">
      <button type="button" class="panel-title" aria-expanded="false">Player View</button>
      <div class="panel-body" hidden>
        <p class="view-hint">The orange outline on the map shows what players currently see.</p>
        <div id="view-default-actions" class="viewport-actions">
          <button id="edit-viewport-btn"  class="btn btn--primary btn--full">Edit Player View</button>
          <button id="reset-viewport-btn" class="btn btn--ghost   btn--full">Reset to Full Map</button>
        </div>
        <div id="edit-viewport-actions" class="viewport-actions" hidden>
          <p class="view-hint view-hint--editing">Drag the rectangle to move · Drag a corner to resize</p>
          <div class="btn-row">
            <button id="viewport-ok-btn"     class="btn btn--primary btn--sm">OK</button>
            <button id="viewport-cancel-btn" class="btn btn--ghost   btn--sm">Cancel</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel" id="bg-colour-panel">
      <button type="button" class="panel-title" aria-expanded="false">Background Colour</button>
      <div class="panel-body" hidden>
        <div class="param-row">
          <label for="view-bg-colour">Colour</label>
          <input type="color" id="view-bg-colour" value="#000000" title="Background colour behind the map" />
        </div>
      </div>
    </section>

    <div id="status" class="status-bar" data-level="ok">Ready</div>

  </aside>

  <main id="main-area">
    <div id="canvas-wrapper">
      <canvas id="renderer-canvas"></canvas>
      <canvas id="fog-canvas"></canvas>
      <canvas id="viewport-canvas"></canvas>
    </div>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
